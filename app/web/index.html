<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="ThriftyChef — smart savings, delicious meals.">
  <meta name="apple-mobile-web-app-title" content="ThriftyChef">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>ThriftyChef</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body { height: 100%; margin: 0; background: #F8FAFC; }
    #boot-splash {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; font-family: system-ui, -apple-system, sans-serif; color: #1E293B;
    }
    #boot-splash .brand {
      font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 8px;
    }
    #boot-splash .brand .thrifty { color: #268387; }
    #boot-splash .brand .chef { color: #E5A99E; font-weight: 900; }
    #boot-splash .tag {
      font-size: 11px; font-weight: 700; letter-spacing: 1.8px; color: #268387;
      margin-bottom: 20px;
    }
    #boot-splash .spinner {
      width: 36px; height: 36px; border: 3px solid #E5E7EB;
      border-top-color: #34A0A4; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="boot-splash">
    <div class="brand"><span class="thrifty">Thrifty</span><span class="chef">Chef</span></div>
    <div class="tag">SMART SAVINGS. DELICIOUS MEALS.</div>
    <div class="spinner"></div>
    <p style="color:#64748B;margin-top:16px">Loading app…</p>
  </div>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="ThriftyChef — smart savings, delicious meals.">
  <meta name="apple-mobile-web-app-title" content="ThriftyChef">
  <meta name="theme-color" content="#EAF8F8">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>ThriftyChef</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #F8FAFC;
    }
    #boot-splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 24px;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #1E293B;
      background: linear-gradient(180deg, #EAF8F8 0%, #F8FAFC 55%);
    }
    #boot-splash .mark {
      width: min(280px, 72vw);
      height: auto;
      display: block;
      margin-bottom: 10px;
    }
    #boot-splash .tag {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.8px;
      color: #268387;
      margin: 0 0 28px;
      text-align: center;
    }
    #boot-splash .spinner {
      width: 34px;
      height: 34px;
      border: 3px solid #D9F2F3;
      border-top-color: #34A0A4;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    #boot-splash .hint {
      color: #64748B;
      margin-top: 16px;
      font-size: 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="boot-splash">
    <img class="mark" src="branding/thriftychef_wordmark.png" alt="ThriftyChef" width="280" height="204">
    <p class="tag">SMART SAVINGS. DELICIOUS MEALS.</p>
    <div class="spinner" aria-hidden="true"></div>
    <p class="hint">Loading app…</p>
  </div>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>

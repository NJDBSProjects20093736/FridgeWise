name: thrifty_chef
description: ThriftyChef — hybrid recipe recommender for food waste reduction
publish_to: "none"
version: 1.0.0+5

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  provider: ^6.1.1
  intl: ^0.20.2
  shared_preferences: ^2.2.2
  mobile_scanner: ^7.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/thriftychef_wordmark.png
    - assets/branding/thriftychef_hat_icon.png
    - assets/branding/thriftychef_app_icon_1024.png

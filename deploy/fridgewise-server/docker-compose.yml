# FridgeWise — API + Flutter web for Linux servers
# Usage:
#   cp .env.example .env   # fill Supabase / DATABASE_URL
#   docker compose up -d --build
#   Web UI: http://localhost:8080
#   API (direct): http://localhost:8000/docs

services:
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: fridgewise-api
    env_file:
      - .env
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8000
    volumes:
      # Required: Phase 1 clean CSVs from your machine
      - ./data/clean:/app/data/clean:ro
      # Required: trained model artifacts (run scripts/train_models.py locally first)
      - ./src/models/artifacts:/app/src/models/artifacts:ro
    ports:
      - "8000:8000"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
      args:
        # Empty = browser uses same host + /api (see app/lib/config/api_config.dart)
        API_BASE_URL: ${API_BASE_URL:-}
    container_name: fridgewise-web
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped
